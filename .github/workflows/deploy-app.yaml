name: Deploy app to gh-pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-renv@v2

      - name: Install Shinylive
        run: install.packages("shinylive")
        shell: Rscript {0}

      - name: Export app
        run: |
          Rscript -e 'shinylive::export("myapp", "site")'
      
      - name: Patch Shinylive Export
        run: Rscript scripts/patch_shinylive.R

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
